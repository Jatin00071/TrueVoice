
<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#E6F1FB',
    primaryTextColor: dark ? '#b5d4f4' : '#0C447C',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o{ POSTS : "writes"
  USERS ||--o{ COMMENTS : "writes"
  USERS ||--o{ LIKES : "gives"
  USERS ||--o{ NOTIFICATIONS : "receives"
  USERS }o--o{ FOLLOWS : "has"
  POSTS ||--o| FINGERPRINTS : "has"
  POSTS ||--o{ COMMENTS : "has"
  POSTS ||--o{ LIKES : "receives"
  POSTS ||--o{ SHIELD_EVENTS : "logs"
  POSTS }o--o| POSTS : "reshares"

  USERS {
    int id PK
    string username
    string email
    string password_hash
    string display_name
    string avatar_url
    tinyint is_verified
    datetime created_at
  }
  POSTS {
    int id PK
    int user_id FK
    text content
    string media_url
    enum media_type
    tinyint is_reshare
    int original_post_id FK
    tinyint shield_active
    datetime created_at
    datetime deleted_at
  }
  FINGERPRINTS {
    int id PK
    int post_id FK
    char hash
    datetime created_at
  }
  COMMENTS {
    int id PK
    int post_id FK
    int user_id FK
    text content
    enum status
    string flagged_reason
    datetime created_at
    datetime deleted_at
  }
  LIKES {
    int id PK
    int post_id FK
    int user_id FK
    datetime created_at
  }
  FOLLOWS {
    int follower_id FK
    int following_id FK
    datetime created_at
  }
  NOTIFICATIONS {
    int id PK
    int recipient_id FK
    int sender_id FK
    enum type
    int post_id FK
    tinyint is_read
    datetime created_at
  }
  SHIELD_EVENTS {
    int id PK
    int post_id FK
    enum trigger_type
    int comment_count
    datetime activated_at
    datetime deactivated_at
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs)-x, h = Math.max(...ys)-y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a,firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
