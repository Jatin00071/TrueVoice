services:
  - type: web
    name: truevoice-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "5000"
      - key: CLIENT_URL
        value: "https://true-voice-psi.vercel.app"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: "truevoice847@gmail.com"
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: "TrueVoice <truevoice847@gmail.com>"
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        value: "TrueVoice <truevoice847@gmail.com>"
      - key: SMTP_TIMEOUT_MS
        value: "8000"
      - key: SMTP_FAMILY
        value: "4"
